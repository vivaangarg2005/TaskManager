<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>DashPro - Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="Dashboard.css">
</head>

<body>
  <div class="container">
    <aside class="left">
      <h1 class="left-head">DashPro</h1>
      <button class="left-btn active"><i class="fa-solid fa-chart-simple"></i> Dashboard</button>
      <button class="left-btn"><i class="fa-solid fa-users"></i> Users</button>
      <button class="left-btn"><i class="fa-solid fa-chart-line"></i> Analytics</button>
      <button class="left-btn"><i class="fa-solid fa-basket-shopping"></i> Orders</button>
      <button class="left-btn"><i class="fa-solid fa-box"></i> Products</button>
      <button class="left-btn"><i class="fa-solid fa-envelope"></i> Messages</button>
      <button class="left-btn"><i class="fa-solid fa-gear"></i> Settings</button>
    </aside>

    <main class="right">
      <nav class="nav">
        <div class="nav-brand">
          <i class="fa-solid fa-bars" style="cursor: pointer;"></i>
          <span>Dashboard</span>
        </div>

        <div class="search">
          <input type="text" placeholder="Search...">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="mode" id="theme-toggle" title="Toggle Light/Dark Mode">
          <i class="fa-regular fa-moon dark-icon"></i>
          <i class="fa-regular fa-sun light-icon"></i>
        </div>

        <div class="profile">
          <div class="image"></div>
          <span>Vivaan Garg</span>
        </div>
      </nav>

      <section class="welcome">
        <div class="box card-users">
          <i class="fa-regular fa-user"></i>
          <h3 class="boxHead">Total Users</h3>
          <h2 class="num">1,250</h2>
        </div>

        <div class="box card-orders">
          <i class="fa-solid fa-cart-arrow-down"></i>
          <h3 class="boxHead">Orders</h3>
          <h2 class="num">320</h2>
        </div>

        <div class="box card-revenue">
          <i class="fa-solid fa-chart-line"></i>
          <h3 class="boxHead">Revenue</h3>
          <h2 class="num">$24,500</h2>
        </div>

        <div class="box card-products">
          <i class="fa-solid fa-cube"></i>
          <h3 class="boxHead">Products</h3>
          <h2 class="num">150</h2>
        </div>
      </section>

      <section class="bottom">
        <div class="recent">
          <h2 class="recent-head">Sales Overview</h2>
          <div class="placeholder-content">
            <i class="fa-solid fa-chart-area placeholder-icon"></i>
            <p>Sales trend analysis graph will load here.</p>
          </div>
        </div>

        <div class="recent">
          <h2 class="recent-head">Recent Activity</h2>
          <div class="placeholder-content">
            <i class="fa-solid fa-list-check placeholder-icon"></i>
            <p>Real-time system events will stream here.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="Dashboard.js"></script>
</body>

</html>
