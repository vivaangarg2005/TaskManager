<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <form action="">

      <h1>Sign Up</h1>
      <input class="inp" type="text" placeholder="Name" id="name">
      <input class="inp" type="email" placeholder="Email">
      <input class="inp" type="password" placeholder="Enter Password" id="pass">
      <input class="inp" type="password" placeholder="Confirm Password" id="confirmPass">
      <button class="login-btn" type="submit">Sign Up</button>
      <h5>Already have an account? <a href="login.html">Log in</a></h5>
    </form>
    <p id="message"></p>


  </div>
  <script src="signup.js"></script>
</body>

</html>
