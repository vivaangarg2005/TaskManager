<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Login Form</h1>

    <form action="">
      <input class="inp" type="email" placeholder="Enter Your Email">
      <input class="inp" type="password" placeholder="password" id="pass">
      <input type="checkbox" id="toggleVisibility">
      <label for="toggleVisibility">Show Password</label>
      <div class="small-container">
        <label class="checkbox-label" for="remember">
          <input id="remember" type="checkbox"> Remember Me
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
      <button class="login-btn" type="submit">Login</button>
    </form>
    <h5>Don't have an account? <a href="signUp.html">Sign up</a></h5>

  </div>
  <script src="script.js"></script>
</body>

</html>
